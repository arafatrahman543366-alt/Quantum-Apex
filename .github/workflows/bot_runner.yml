name: Quantum Apex Ultra Quant Engine

on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 to fix the Node.js warning

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5 to fix the Node.js warning
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Quantum Apex Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: "sqlite:///crypto_signals.db"
          PYTHONPATH: .
        run: python main.py scan

      - name: Run Quantum Apex Tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: "sqlite:///crypto_signals.db"
          PYTHONPATH: .
        run: python main.py track
        
