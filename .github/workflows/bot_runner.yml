name: Quantum Apex Ultra Quant Engine

on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug File Structure
        run: ls -R # This will show us exactly where your files are

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Check if requirements.txt is in the root or a subfolder
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          elif [ -f crypto_signal_bot/requirements.txt ]; then
            pip install -r crypto_signal_bot/requirements.txt
          fi

      - name: Run Quantum Apex Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: "sqlite:///crypto_signals.db"
          PYTHONPATH: .
        run: |
          # Try running from root, then try from subfolder
          if [ -f main.py ]; then
            python main.py scan
          elif [ -f crypto_signal_bot/main.py ]; then
            cd crypto_signal_bot && python main.py scan
          else
            echo "Error: main.py not found!"
            exit 1
          fi
