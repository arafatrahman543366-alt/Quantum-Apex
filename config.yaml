# Crypto Signal Bot Configuration

market:
  symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "BNB/USDT", "ADA/USDT", "XRP/USDT", "DOT/USDT", "LUNA/USDT", "AVAX/USDT", "DOGE/USDT"]
  timeframes:
    trend: "1d"
    direction: "4h"
    setup: "1h"
    entry: "15m"

indicators:
  ema:
    short: 20
    medium: 50
    long: 200
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  macd:
    fast: 12
    slow: 26
    signal: 9

scoring:
  thresholds:
    elite: 95
    premium: 90
  weights:
    trend: 25
    structure: 25
    volume: 20
    momentum: 15
    market_health: 15

filters:
  btc_trend_required: true
  max_volatility: 5.0 # Percentage
  min_volume_24h: 10000000 # USD

anti_spam:
  cooldown_hours: 24
  max_active_signals_per_coin: 1

trade_management:
  expiry_hours: 4
  tp_targets: [1.0, 2.0, 3.0] # Multipliers for Risk

telegram:
  channel_branding: "Quantum Apex Ultra"
  watermark: "© Quantum Apex Quant Engine"

logging:
  level: "INFO"
  file: "bot.log"
